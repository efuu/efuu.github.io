<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>efuu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;color:#fff;font-family:'Courier New',monospace;
  height:100vh;height:100dvh;overflow:hidden;cursor:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}

canvas#noise{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.035}

.grid{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
  background:
    linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;
}

.glyph{
  position:fixed;z-index:2;font-size:11px;color:rgba(255,255,255,0.05);
  pointer-events:none;animation:drift 20s linear infinite;
}
@keyframes drift{
  0%{transform:translateY(0) rotate(0deg);opacity:0}
  10%{opacity:0.05}90%{opacity:0.05}
  100%{transform:translateY(-100vh) rotate(360deg);opacity:0}
}

.scanline{
  position:fixed;top:0;left:0;width:100%;height:2px;z-index:99;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.025),transparent);
  animation:scan 8s linear infinite;pointer-events:none;
}
@keyframes scan{0%{top:-2px}100%{top:100vh}}

.center{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* ── PORTALS ── */
.portals{display:flex;gap:100px;align-items:center}

.portal{
  position:relative;width:160px;height:160px;
  display:flex;align-items:center;justify-content:center;
  cursor:none;text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}

.portal-ring{
  position:absolute;width:100%;height:100%;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:50%;transition:all 1.2s cubic-bezier(0.16,1,0.3,1);
}
.portal.active .portal-ring,.portal:hover .portal-ring{
  border-color:rgba(255,255,255,0.35);
  box-shadow:0 0 80px rgba(255,255,255,0.05),inset 0 0 60px rgba(255,255,255,0.03);
  transform:scale(1.08);
}
.portal.active .ring-2,.portal:hover .ring-2{transform:scale(0.92) rotate(45deg)!important;border-color:rgba(255,255,255,0.2)}
.portal.active .ring-3,.portal:hover .ring-3{transform:scale(1.18) rotate(-30deg)!important;border-color:rgba(255,255,255,0.12)}
.ring-2{transition:all 1.4s cubic-bezier(0.16,1,0.3,1)}
.ring-3{transition:all 1s cubic-bezier(0.16,1,0.3,1)}

/* ── PARTICLE CANVAS (inside each portal) ── */
canvas.particles{
  position:absolute;width:100%;height:100%;z-index:2;
  pointer-events:none;border-radius:50%;
}

/* ── HOTKEY HINT ── */
.hotkey{
  position:absolute;bottom:-28px;font-size:9px;letter-spacing:3px;
  color:rgba(255,255,255,0);transition:all 0.6s ease;
  z-index:3;
}
.portal.active .hotkey,.portal:hover .hotkey{color:rgba(255,255,255,0.15)}

/* ── DIVIDER ── */
.divider{width:1px;height:60px;background:linear-gradient(transparent,rgba(255,255,255,0.05),transparent)}

/* ── CURSOR ── */
.cursor{
  position:fixed;width:12px;height:12px;z-index:9999;
  pointer-events:none;mix-blend-mode:difference;
}
.cursor-dot{width:4px;height:4px;background:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.cursor-ring{
  width:12px;height:12px;border:1px solid rgba(255,255,255,0.4);
  position:absolute;top:0;left:0;transition:all 0.3s ease;border-radius:50%;
}
body.hovering .cursor-ring{width:36px;height:36px;top:-12px;left:-12px;border-color:rgba(255,255,255,0.6)}

/* ── CORNER MARKS ── */
.corner{position:fixed;z-index:5;font-size:7px;color:rgba(255,255,255,0.05);letter-spacing:2px}
.corner.tl{top:24px;left:24px}
.corner.tr{top:24px;right:24px}
.corner.bl{bottom:24px;left:24px}
.corner.br{bottom:24px;right:24px;text-align:right}

/* ── RIPPLE ── */
.ripple{
  position:fixed;border:1px solid rgba(255,255,255,0.12);border-radius:50%;
  pointer-events:none;z-index:98;animation:rippleOut 0.8s ease-out forwards;
}
@keyframes rippleOut{
  0%{width:0;height:0;opacity:0.3}
  100%{width:120px;height:120px;opacity:0;margin-top:-60px;margin-left:-60px}
}

/* ── TRANSITION ── */
.transition-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;
  background:#000;opacity:0;pointer-events:none;transition:opacity 0.6s ease;
}
.transition-overlay.active{opacity:1;pointer-events:all}

/* ── KONAMI FLASH ── */
@keyframes konamiFlash{
  0%{background:rgba(255,255,255,0)}
  50%{background:rgba(255,255,255,0.04)}
  100%{background:rgba(255,255,255,0)}
}
.konami-flash{animation:konamiFlash 0.6s ease}

/* ── MOBILE ── */
@media(max-width:600px){
  .portals{flex-direction:column;gap:50px}
  .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent)}
  .portal{width:130px;height:130px}
  .cursor{display:none}
  body{cursor:default}
  .portal{cursor:pointer}
  .corner{font-size:6px}
  .corner.tl,.corner.tr{top:16px}
  .corner.bl,.corner.br{bottom:16px}
  .corner.tl,.corner.bl{left:16px}
  .corner.tr,.corner.br{right:16px}
  .hotkey{display:none}
}
@media(max-width:360px){
  .portal{width:110px;height:110px}
  .portals{gap:40px}
}
@media(hover:none){
  .portal:active .portal-ring{
    border-color:rgba(255,255,255,0.35);
    box-shadow:0 0 80px rgba(255,255,255,0.05),inset 0 0 60px rgba(255,255,255,0.03);
    transform:scale(1.08);
  }
}
</style>
</head>
<body>

<canvas id="noise"></canvas>
<div class="grid"></div>
<div class="scanline"></div>

<div class="corner tl" id="time-display">00:00:00</div>
<div class="corner tr" id="coord-display"></div>
<div class="corner bl" id="fps-display"></div>
<div class="corner br">efuu</div>

<div class="center">
  <div class="portals">
    <a class="portal" id="p-list" href="list.html" onclick="navigate(event,'list.html')">
      <div class="portal-ring"></div>
      <div class="portal-ring ring-2"></div>
      <div class="portal-ring ring-3"></div>
      <canvas class="particles" id="particles-0"></canvas>
      <div class="hotkey">[1]</div>
    </a>

    <div class="divider"></div>

    <a class="portal" id="p-menu" href="harvardmenu/" onclick="navigate(event,'harvardmenu/')">
      <div class="portal-ring"></div>
      <div class="portal-ring ring-2"></div>
      <div class="portal-ring ring-3"></div>
      <canvas class="particles" id="particles-1"></canvas>
      <div class="hotkey">[2]</div>
    </a>
  </div>
</div>

<div class="transition-overlay" id="transition"></div>
<div class="cursor" id="cursor"><div class="cursor-dot"></div><div class="cursor-ring"></div></div>

<script>
// ── CONFIG ──
const URLS=['list.html','harvardmenu/'];
const portals=[document.getElementById('p-list'),document.getElementById('p-menu')];
let selected=-1; // keyboard focus index

// ── CURSOR (desktop) ──
const cursorEl=document.getElementById('cursor');
let mx=-100,my=-100,curX=-100,curY=-100;
const isTouch='ontouchstart'in window;
if(!isTouch){
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  (function loop(){
    curX+=(mx-curX)*0.12;curY+=(my-curY)*0.12;
    cursorEl.style.left=curX-6+'px';cursorEl.style.top=curY-6+'px';
    requestAnimationFrame(loop);
  })();
  portals.forEach(p=>{
    p.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
    p.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
  });
}else{
  cursorEl.style.display='none';
}

// ── NOISE ──
const nc=document.getElementById('noise'),nx=nc.getContext('2d');
function resizeNoise(){nc.width=window.innerWidth/4;nc.height=window.innerHeight/4}
resizeNoise();window.addEventListener('resize',resizeNoise);
function drawNoise(){
  const img=nx.createImageData(nc.width,nc.height);
  const d=img.data;
  for(let i=0;i<d.length;i+=8){const v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255}
  nx.putImageData(img,0,0);
}
setInterval(drawNoise,120);

// ── GLYPHS ──
const glyphs='\u27D0\u25C7\u25C8\u2B21\u2B22\u25B3\u25BD\u2295\u2297\u2298\u229E\u22A1'.split('');
function spawnGlyph(){
  const g=document.createElement('div');
  g.className='glyph';
  g.textContent=glyphs[Math.random()*glyphs.length|0];
  g.style.left=Math.random()*100+'%';
  g.style.top=100+Math.random()*20+'%';
  const dur=15+Math.random()*25;
  g.style.animationDuration=dur+'s';
  g.style.fontSize=8+Math.random()*5+'px';
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),dur*1000);
}
setInterval(spawnGlyph,1200);
for(let i=0;i<8;i++)setTimeout(spawnGlyph,i*300);

// ── PARTICLE SYSTEMS (one per portal) ──
const pSystems=[];
function initParticles(){
  portals.forEach((portal,idx)=>{
    const c=document.getElementById('particles-'+idx);
    const size=portal.offsetWidth||160;
    c.width=size;c.height=size;
    const ctx=c.getContext('2d');
    const dots=[];
    const count=idx===0?12:16;
    for(let i=0;i<count;i++){
      if(idx===0){
        // orbiting dots (circular motion)
        const orbit=15+Math.random()*35;
        const speed=0.003+Math.random()*0.006;
        const phase=Math.random()*Math.PI*2;
        dots.push({type:'orbit',orbit,speed,phase,angle:phase,r:1+Math.random()*1.5});
      }else{
        // constellation dots (drift + connect)
        dots.push({
          type:'constellation',
          x:size*0.2+Math.random()*size*0.6,
          y:size*0.2+Math.random()*size*0.6,
          vx:(Math.random()-0.5)*0.3,
          vy:(Math.random()-0.5)*0.3,
          r:1+Math.random()*1.2
        });
      }
    }
    pSystems.push({ctx,dots,size,idx,hovered:false});
  });
}

function drawParticles(time){
  pSystems.forEach(sys=>{
    const{ctx,dots,size,idx}=sys;
    const cx=size/2,cy=size/2,rad=size/2;
    ctx.clearRect(0,0,size,size);
    const isHov=portals[idx].matches(':hover')||portals[idx].classList.contains('active');
    const alpha=isHov?0.6:0.1;
    const lineAlpha=isHov?0.15:0.03;

    if(idx===0){
      // orbiting particles
      dots.forEach(d=>{
        d.angle+=d.speed*(isHov?2.5:1);
        const x=cx+Math.cos(d.angle)*d.orbit;
        const y=cy+Math.sin(d.angle)*d.orbit;
        ctx.beginPath();ctx.arc(x,y,d.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,'+alpha+')';ctx.fill();
      });
      // faint orbit rings
      [20,35,50].forEach(r=>{
        ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.strokeStyle='rgba(255,255,255,'+(lineAlpha*0.5)+')';
        ctx.lineWidth=0.5;ctx.stroke();
      });
    }else{
      // constellation particles
      dots.forEach(d=>{
        d.x+=d.vx;d.y+=d.vy;
        // bounce inside circle
        const dx=d.x-cx,dy=d.y-cy;
        if(Math.sqrt(dx*dx+dy*dy)>rad*0.7){
          d.vx*=-1;d.vy*=-1;
          d.x+=d.vx*2;d.y+=d.vy*2;
        }
        ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,'+alpha+')';ctx.fill();
      });
      // connecting lines
      for(let i=0;i<dots.length;i++){
        for(let j=i+1;j<dots.length;j++){
          const dx=dots[i].x-dots[j].x,dy=dots[i].y-dots[j].y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<55){
            ctx.beginPath();
            ctx.moveTo(dots[i].x,dots[i].y);
            ctx.lineTo(dots[j].x,dots[j].y);
            ctx.strokeStyle='rgba(255,255,255,'+(lineAlpha*(1-dist/55))+')';
            ctx.lineWidth=0.5;ctx.stroke();
          }
        }
      }
    }
  });
  requestAnimationFrame(drawParticles);
}

// ── CLOCK ──
function tick(){
  const n=new Date();
  document.getElementById('time-display').textContent=
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}
setInterval(tick,1000);tick();

// ── COORDS ──
if(!isTouch){
  document.addEventListener('mousemove',e=>{
    const x=((e.clientX/window.innerWidth)*180-90).toFixed(1);
    const y=((e.clientY/window.innerHeight)*90-45).toFixed(1);
    document.getElementById('coord-display').textContent=y+'\u00B0 '+x+'\u00B0';
  });
}

// ── FPS COUNTER ──
let frames=0,lastFps=Date.now();
function countFps(){
  frames++;
  const now=Date.now();
  if(now-lastFps>=1000){
    document.getElementById('fps-display').textContent=frames+'fps';
    frames=0;lastFps=now;
  }
  requestAnimationFrame(countFps);
}
countFps();

// ── RIPPLE ──
function doRipple(x,y){
  const r=document.createElement('div');
  r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';
  document.body.appendChild(r);setTimeout(()=>r.remove(),800);
}
document.addEventListener('click',e=>doRipple(e.clientX,e.clientY));
document.addEventListener('touchstart',e=>{
  const t=e.touches[0];if(t)doRipple(t.clientX,t.clientY);
},{passive:true});

// ── NAVIGATE ──
function navigate(e,url){
  e.preventDefault();
  document.getElementById('transition').classList.add('active');
  setTimeout(()=>window.location.href=url,600);
}

// ── RING ROTATION ──
let angle=0;
(function rot(){
  angle+=0.12;
  portals.forEach((p,i)=>{
    if(p.matches(':hover')||p.classList.contains('active'))return;
    const rings=p.querySelectorAll('.ring-2,.ring-3');
    const o=i*180;
    if(rings[0])rings[0].style.transform='scale(0.85) rotate('+(45+angle+o)+'deg)';
    if(rings[1])rings[1].style.transform='scale(1.12) rotate('+(-30-angle*0.7+o)+'deg)';
  });
  requestAnimationFrame(rot);
})();

// ── KEYBOARD ──
function selectPortal(idx){
  portals.forEach((p,i)=>p.classList.toggle('active',i===idx));
  selected=idx;
  document.body.classList.toggle('hovering',idx>=0);
}
document.addEventListener('keydown',e=>{
  // direct jump
  if(e.key==='1'){e.preventDefault();navigate(new Event('x'),URLS[0])}
  if(e.key==='2'){e.preventDefault();navigate(new Event('x'),URLS[1])}
  // arrow selection
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
    e.preventDefault();selectPortal(0);
  }
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){
    e.preventDefault();selectPortal(1);
  }
  // enter to confirm selection
  if(e.key==='Enter'&&selected>=0){
    e.preventDefault();navigate(new Event('x'),URLS[selected]);
  }
  // tab to toggle between portals
  if(e.key==='Tab'){
    e.preventDefault();
    selectPortal(selected===0?1:0);
  }
  // escape to deselect
  if(e.key==='Escape'){
    selectPortal(-1);
  }
});

// ── KONAMI CODE EASTER EGG ──
const konami=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiIdx=0;
document.addEventListener('keydown',e=>{
  if(e.key===konami[konamiIdx]){
    konamiIdx++;
    if(konamiIdx===konami.length){
      konamiIdx=0;
      document.body.classList.add('konami-flash');
      setTimeout(()=>document.body.classList.remove('konami-flash'),600);
      // invert colors for 3 seconds
      document.body.style.filter='invert(1) hue-rotate(180deg)';
      setTimeout(()=>document.body.style.filter='',3000);
    }
  }else{
    konamiIdx=e.key===konami[0]?1:0;
  }
});

// ── MAGNETIC CURSOR PULL (desktop) ──
if(!isTouch){
  const PULL_RANGE=200,PULL_STRENGTH=0.15;
  portals.forEach(p=>{
    p.addEventListener('mousemove',e=>{
      const rect=p.getBoundingClientRect();
      const pcx=rect.left+rect.width/2,pcy=rect.top+rect.height/2;
      const dx=pcx-e.clientX,dy=pcy-e.clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<PULL_RANGE&&dist>0){
        const force=(1-dist/PULL_RANGE)*PULL_STRENGTH;
        mx=e.clientX+dx*force;
        my=e.clientY+dy*force;
      }
    });
  });
}

// ── INIT ──
initParticles();
requestAnimationFrame(drawParticles);
</script>
</body>
</html>
