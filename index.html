<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>efuu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@font-face{font-family:'BerkeleyMono';src:local('Berkeley Mono'),local('BerkeleyMono-Regular')}
body{
  background:#000;color:#fff;font-family:'BerkeleyMono','Courier New',monospace;
  height:100vh;overflow:hidden;cursor:none;user-select:none;
}

/* ── STATIC NOISE BACKGROUND ── */
canvas#noise{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.04}

/* ── GRID LINES ── */
.grid{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
  background:
    linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

/* ── FLOATING GLYPHS ── */
.glyph{
  position:fixed;z-index:2;font-size:11px;color:rgba(255,255,255,0.06);
  pointer-events:none;animation:drift 20s linear infinite;
}
@keyframes drift{
  0%{transform:translateY(0) rotate(0deg);opacity:0}
  10%{opacity:0.06}
  90%{opacity:0.06}
  100%{transform:translateY(-100vh) rotate(360deg);opacity:0}
}

/* ── CENTER LAYOUT ── */
.center{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
}

/* ── TITLE ── */
.title{
  font-size:13px;letter-spacing:12px;color:rgba(255,255,255,0.12);
  margin-bottom:80px;text-transform:uppercase;
}

/* ── PORTALS ── */
.portals{
  display:flex;gap:120px;align-items:center;
}
.portal{
  position:relative;width:180px;height:180px;
  display:flex;align-items:center;justify-content:center;
  cursor:none;text-decoration:none;
}
.portal-ring{
  position:absolute;width:100%;height:100%;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:50%;transition:all 1.2s cubic-bezier(0.16,1,0.3,1);
}
.portal:hover .portal-ring{
  border-color:rgba(255,255,255,0.25);
  box-shadow:0 0 60px rgba(255,255,255,0.03),inset 0 0 60px rgba(255,255,255,0.02);
  transform:scale(1.08);
}
.portal:hover .ring-2{transform:scale(0.92) rotate(45deg)!important;border-color:rgba(255,255,255,0.15)}
.portal:hover .ring-3{transform:scale(1.18) rotate(-30deg)!important;border-color:rgba(255,255,255,0.08)}
.ring-2{transition:all 1.4s cubic-bezier(0.16,1,0.3,1)}
.ring-3{transition:all 1s cubic-bezier(0.16,1,0.3,1)}

.portal-symbol{
  font-size:22px;color:rgba(255,255,255,0.1);
  transition:all 0.8s cubic-bezier(0.16,1,0.3,1);
  z-index:2;letter-spacing:2px;
}
.portal:hover .portal-symbol{color:rgba(255,255,255,0.7);text-shadow:0 0 30px rgba(255,255,255,0.15)}

.portal-label{
  position:absolute;bottom:-40px;font-size:8px;letter-spacing:6px;
  color:rgba(255,255,255,0);transition:all 0.8s ease;text-transform:uppercase;
  white-space:nowrap;
}
.portal:hover .portal-label{color:rgba(255,255,255,0.3)}

/* ── DIVIDER ── */
.divider{
  width:1px;height:80px;background:linear-gradient(transparent,rgba(255,255,255,0.06),transparent);
}

/* ── SCAN LINE ── */
.scanline{
  position:fixed;top:0;left:0;width:100%;height:2px;z-index:99;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);
  animation:scan 8s linear infinite;pointer-events:none;
}
@keyframes scan{0%{top:-2px}100%{top:100vh}}

/* ── CURSOR ── */
.cursor{
  position:fixed;width:12px;height:12px;z-index:9999;
  pointer-events:none;mix-blend-mode:difference;
  transition:transform 0.15s ease;
}
.cursor-dot{
  width:4px;height:4px;background:#fff;position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.cursor-ring{
  width:12px;height:12px;border:1px solid rgba(255,255,255,0.4);
  position:absolute;top:0;left:0;transition:all 0.3s ease;border-radius:50%;
}
body.hovering .cursor-ring{
  width:36px;height:36px;top:-12px;left:-12px;
  border-color:rgba(255,255,255,0.6);
}

/* ── CORNER MARKS ── */
.corner{position:fixed;z-index:5;font-size:8px;color:rgba(255,255,255,0.06);letter-spacing:2px}
.corner.tl{top:30px;left:30px}
.corner.tr{top:30px;right:30px}
.corner.bl{bottom:30px;left:30px}
.corner.br{bottom:30px;right:30px;text-align:right}

/* ── BOTTOM PULSE ── */
.pulse{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:8px;color:rgba(255,255,255,0.08);letter-spacing:4px;
  animation:bpulse 4s ease-in-out infinite;
}
@keyframes bpulse{0%,100%{opacity:0.08}50%{opacity:0.2}}

/* ── CLICK RIPPLE ── */
.ripple{
  position:fixed;border:1px solid rgba(255,255,255,0.15);border-radius:50%;
  pointer-events:none;z-index:98;
  animation:rippleOut 0.8s ease-out forwards;
}
@keyframes rippleOut{
  0%{width:0;height:0;opacity:0.4}
  100%{width:120px;height:120px;opacity:0;margin-top:-60px;margin-left:-60px}
}

/* ── TRANSITION OVERLAY ── */
.transition-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;
  background:#000;opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
.transition-overlay.active{opacity:1;pointer-events:all}

/* ── GLITCH TEXT ── */
.glitch{position:relative}
.glitch::before,.glitch::after{
  content:attr(data-text);position:absolute;top:0;left:0;
  width:100%;height:100%;
}
.glitch::before{
  animation:glitch1 3s infinite;color:rgba(255,0,0,0.03);
  clip-path:inset(0 0 80% 0);
}
.glitch::after{
  animation:glitch2 3s infinite;color:rgba(0,255,255,0.03);
  clip-path:inset(80% 0 0 0);
}
@keyframes glitch1{
  0%,92%,100%{transform:none}
  93%{transform:translate(-2px,-1px)}
  96%{transform:translate(2px,1px)}
}
@keyframes glitch2{
  0%,88%,100%{transform:none}
  89%{transform:translate(2px,1px)}
  94%{transform:translate(-1px,-2px)}
}

/* ── MOBILE ── */
@media(max-width:600px){
  .portals{flex-direction:column;gap:60px}
  .divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent)}
  .portal{width:140px;height:140px}
  .portal-label{bottom:-30px;font-size:7px}
  .corner{font-size:7px}
}
</style>
</head>
<body>

<canvas id="noise"></canvas>
<div class="grid"></div>
<div class="scanline"></div>

<div class="corner tl">SYS.0</div>
<div class="corner tr" id="coord-display">00.0°</div>
<div class="corner bl" id="time-display">00:00:00</div>
<div class="corner br">efuu<br>v2.0</div>

<div class="center">
  <div class="title glitch" data-text="efuu">efuu</div>

  <div class="portals">
    <a class="portal" id="p-menu" href="harvardmenu/" onclick="navigate(event,'harvardmenu/')">
      <div class="portal-ring"></div>
      <div class="portal-ring ring-2"></div>
      <div class="portal-ring ring-3"></div>
      <div class="portal-symbol">&#9678;</div>
      <div class="portal-label">nourish</div>
    </a>

    <div class="divider"></div>

    <a class="portal" id="p-list" href="list.html" onclick="navigate(event,'list.html')">
      <div class="portal-ring"></div>
      <div class="portal-ring ring-2"></div>
      <div class="portal-ring ring-3"></div>
      <div class="portal-symbol">&#9687;</div>
      <div class="portal-label">archive</div>
    </a>
  </div>
</div>

<div class="pulse">select endpoint</div>
<div class="transition-overlay" id="transition"></div>
<div class="cursor" id="cursor"><div class="cursor-dot"></div><div class="cursor-ring"></div></div>

<script>
// ── CUSTOM CURSOR ──
const cursor=document.getElementById('cursor');
let mx=-100,my=-100,cx=-100,cy=-100;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function loop(){
  cx+=(mx-cx)*0.12;cy+=(my-cy)*0.12;
  cursor.style.left=cx-6+'px';cursor.style.top=cy-6+'px';
  requestAnimationFrame(loop);
})();

document.querySelectorAll('.portal').forEach(p=>{
  p.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
  p.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
});

// ── NOISE CANVAS ──
const nc=document.getElementById('noise'),nx=nc.getContext('2d');
function resizeNoise(){nc.width=window.innerWidth/4;nc.height=window.innerHeight/4}
resizeNoise();window.addEventListener('resize',resizeNoise);
function drawNoise(){
  const img=nx.createImageData(nc.width,nc.height);
  const d=img.data;
  for(let i=0;i<d.length;i+=8){
    const v=Math.random()*255;
    d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;
  }
  nx.putImageData(img,0,0);
}
setInterval(drawNoise,120);

// ── FLOATING GLYPHS ──
const glyphs='\u27D0\u27E1\u2B21\u2394\u23E3\u25C7\u25C8\u2B22\u27E0\u23E5\u238A\u23E2\u25B3\u25BD\u22A1\u229E\u2295\u2297\u2298\u27C1\u23C3\u23C4\u23C5'.split('');
function spawnGlyph(){
  const g=document.createElement('div');
  g.className='glyph';
  g.textContent=glyphs[Math.random()*glyphs.length|0];
  g.style.left=Math.random()*100+'%';
  g.style.top=100+Math.random()*20+'%';
  const dur=15+Math.random()*25;
  g.style.animationDuration=dur+'s';
  g.style.fontSize=8+Math.random()*6+'px';
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),dur*1000);
}
setInterval(spawnGlyph,900);
for(let i=0;i<10;i++)setTimeout(spawnGlyph,i*250);

// ── CLOCK ──
function updateTime(){
  const now=new Date();
  document.getElementById('time-display').textContent=
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
}
setInterval(updateTime,1000);updateTime();

// ── COORDINATE DISPLAY (tracks mouse) ──
document.addEventListener('mousemove',e=>{
  const x=((e.clientX/window.innerWidth)*180-90).toFixed(1);
  const y=((e.clientY/window.innerHeight)*90-45).toFixed(1);
  document.getElementById('coord-display').textContent=y+'\u00B0N '+x+'\u00B0E';
});

// ── CLICK RIPPLE ──
document.addEventListener('click',e=>{
  const r=document.createElement('div');
  r.className='ripple';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),800);
});

// ── NAVIGATION WITH TRANSITION ──
function navigate(e,url){
  e.preventDefault();
  document.getElementById('transition').classList.add('active');
  setTimeout(()=>window.location.href=url,600);
}

// ── PORTAL IDLE ROTATION ──
let angle=0;
(function rotateRings(){
  angle+=0.12;
  document.querySelectorAll('.portal').forEach((p,i)=>{
    const rings=p.querySelectorAll('.ring-2,.ring-3');
    const offset=i*180;
    if(rings[0]&&!p.matches(':hover'))rings[0].style.transform='scale(0.85) rotate('+(45+angle+offset)+'deg)';
    if(rings[1]&&!p.matches(':hover'))rings[1].style.transform='scale(1.12) rotate('+(-30-angle*0.7+offset)+'deg)';
  });
  requestAnimationFrame(rotateRings);
})();

// ── KEYBOARD NAV ──
document.addEventListener('keydown',e=>{
  if(e.key==='1'||e.key==='ArrowLeft'){e.preventDefault();navigate(new Event('x'),'harvardmenu/')}
  if(e.key==='2'||e.key==='ArrowRight'){e.preventDefault();navigate(new Event('x'),'list.html')}
});
</script>
</body>
</html>
