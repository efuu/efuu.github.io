<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>efuu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#030810;font-family:system-ui,-apple-system,sans-serif}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* Nav — three tap zones spanning the screen */
.nav{
  position:fixed;z-index:2;top:0;left:0;width:100%;height:100%;
  display:flex;pointer-events:none;
}
.nav a{
  pointer-events:all;text-decoration:none;
  flex:1;display:flex;align-items:flex-end;justify-content:center;
  cursor:pointer;position:relative;
}
.pip{display:none}

.transition-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;
  background:#030810;opacity:0;pointer-events:none;transition:opacity 0.6s ease;
}
.transition-overlay.active{opacity:1;pointer-events:all}

@media(max-width:500px){.nav a{padding-bottom:28px}}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="eyes" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none"></canvas>

<nav class="nav">
  <a href="list.html" onclick="go(event,'list.html')"><span class="pip"></span></a>
  <a href="harvardmenu/" onclick="go(event,'harvardmenu/')"><span class="pip"></span></a>
  <a href="poker/" onclick="go(event,'poker/')"><span class="pip"></span></a>
</nav>
<div class="transition-overlay" id="transition"></div>

<script>
function go(e,u){e.preventDefault();document.getElementById('transition').classList.add('active');setTimeout(()=>location.href=u,500)}

const bgCanvas=document.getElementById('bg');
const gl=bgCanvas.getContext('webgl',{alpha:false,antialias:false});
const dpr=Math.min(window.devicePixelRatio,2);
let W=window.innerWidth,H=window.innerHeight;

function resizeBg(){W=window.innerWidth;H=window.innerHeight;bgCanvas.width=W*dpr;bgCanvas.height=H*dpr;gl.viewport(0,0,bgCanvas.width,bgCanvas.height)}
resizeBg();window.addEventListener('resize',resizeBg);

const vsrc=`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
const fsrc=`
precision highp float;
uniform float t;
uniform vec2 res;
uniform vec2 mouse;
uniform float touch;

vec3 mod289(vec3 x){return x-floor(x/289.)*289.;}
vec2 mod289(vec2 x){return x-floor(x/289.)*289.;}
vec3 permute(vec3 x){return mod289((x*34.+1.)*x);}
float snoise(vec2 v){
  const vec4 C=vec4(.211325,.366025,-.577350,.024390);
  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);
  vec2 i1=x0.x>x0.y?vec2(1,0):vec2(0,1);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0,i1.y,1.))+i.x+vec3(0,i1.x,1.));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m*m*m;
  vec3 x=2.*fract(p*C.www)-1.,h=abs(x)-.5,ox=floor(x+.5),a0=x-ox;
  m*=1.7928-0.8537*(a0*a0+h*h);
  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}

float fbm(vec2 p){
  float f=0.,amp=0.5;
  for(int i=0;i<5;i++){f+=amp*snoise(p);p*=2.1;amp*=0.5;}
  return f;
}

void main(){
  vec2 p=(gl_FragCoord.xy-0.5*res)/min(res.x,res.y);
  float T=t*0.15;

  // Domain warping — moderate, natural texture not forced swirls
  vec2 q=vec2(fbm(p+T*0.3),fbm(p+vec2(5.2,1.3)+T*0.2));
  vec2 r=vec2(fbm(p+2.0*q+vec2(1.7,9.2)+T*0.15),fbm(p+2.0*q+vec2(8.3,2.8)+T*0.12));
  float f=fbm(p+2.0*r);


  float pat=length(q)*1.5;
  float rl=length(r);

  // ── DEEP BLACK BASE ──
  vec3 col=vec3(0.0,0.0,0.002);

  // ── BLUES — rich marine, not everywhere ──
  vec3 marine=vec3(0.01,0.07,0.22);
  vec3 deepBlue=vec3(0.005,0.03,0.10);
  vec3 brightBlue=vec3(0.03,0.12,0.32);

  col+=deepBlue*smoothstep(0.0,0.6,f)*0.5;
  col+=marine*smoothstep(0.3,0.8,pat)*0.25;
  col+=brightBlue*smoothstep(0.1,0.6,sin(f*3.14+T))*0.2;
  col+=deepBlue*smoothstep(0.3,0.7,rl)*0.2;

  // ── BRIGHT GOLD + WHITE ──
  vec3 gold=vec3(1.0,0.85,0.1);
  vec3 brightWhite=vec3(1.0,1.0,0.85);

  // Gold in veins
  float veins=smoothstep(0.2,0.55,abs(f));
  col+=gold*veins*0.2;

  // Very bright gold+white highlights
  float hot=smoothstep(0.55,0.8,f*f+pat*0.3);
  col+=gold*hot*0.5;
  col+=brightWhite*hot*0.15;

  // White sparkle in the brightest spots
  float peak=smoothstep(0.75,0.95,f*f+pat*0.4);
  col+=brightWhite*peak*0.3;

  // Fine shimmer
  float shimmer=snoise(p*8.0+T*0.5)*0.5+0.5;
  col+=gold*shimmer*veins*0.04;


  // Vignette
  col*=max(1.0-0.35*dot(p*0.7,p*0.7),0.0);

  // Grain
  float grain=fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453);
  col+=vec3(grain)*0.005;

  // Strong contrast
  col=pow(max(col,0.0),vec3(0.78));

  gl_FragColor=vec4(col,1);
}`;

function mkS(s,t){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh}
const prog=gl.createProgram();
gl.attachShader(prog,mkS(vsrc,gl.VERTEX_SHADER));
gl.attachShader(prog,mkS(fsrc,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aa=gl.getAttribLocation(prog,'a');gl.enableVertexAttribArray(aa);gl.vertexAttribPointer(aa,2,gl.FLOAT,false,0,0);
const uT=gl.getUniformLocation(prog,'t'),uR=gl.getUniformLocation(prog,'res'),uM=gl.getUniformLocation(prog,'mouse'),uTouch=gl.getUniformLocation(prog,'touch');

let mx=W*dpr*0.5,my=H*dpr*0.5,touching=0,targetTouch=0;
document.addEventListener('mousemove',e=>{mx=e.clientX*dpr;my=e.clientY*dpr;targetTouch=1});
document.addEventListener('mouseleave',()=>{targetTouch=0});
document.addEventListener('touchstart',e=>{const t=e.touches[0];mx=t.clientX*dpr;my=t.clientY*dpr;targetTouch=1},{passive:true});
document.addEventListener('touchmove',e=>{const t=e.touches[0];mx=t.clientX*dpr;my=t.clientY*dpr},{passive:true});
document.addEventListener('touchend',()=>{targetTouch=0},{passive:true});


// ── EYES Canvas 2D ──
const eyeCanvas=document.getElementById('eyes');
const ectx=eyeCanvas.getContext('2d');
function resizeEyes(){
  eyeCanvas.width=W*dpr;eyeCanvas.height=H*dpr;
  ectx.scale(dpr,dpr);
}
resizeEyes();
window.addEventListener('resize',()=>{W=innerWidth;H=innerHeight;resizeEyes()});

const eyePositions=[0.25,0.50,0.75];
function getEyeY(){ return H - 80; } // 80px from bottom

function drawEyes(time){
  ectx.clearRect(0,0,W,H);
  var t=time/1000;
  var cursorX=mx/dpr, cursorY=my/dpr;
  var eyeYPos=H-80;

  for(var i=0;i<3;i++){
    var cx=W*eyePositions[i];
    var cy=eyeYPos;
    var ew=28, eh=12;

    // Dark backdrop
    var g1=ectx.createRadialGradient(cx,cy,ew*0.5,cx,cy,ew*2.5);
    g1.addColorStop(0,'rgba(0,3,10,0.9)');
    g1.addColorStop(1,'rgba(0,3,10,0)');
    ectx.fillStyle=g1;
    ectx.fillRect(cx-ew*3,cy-ew*3,ew*6,ew*6);

    // Eye shape
    ectx.beginPath();
    ectx.moveTo(cx-ew,cy);
    ectx.quadraticCurveTo(cx,cy-eh*1.8,cx+ew,cy);
    ectx.quadraticCurveTo(cx,cy+eh*1.8,cx-ew,cy);
    ectx.closePath();
    ectx.fillStyle='rgba(5,8,20,0.9)';
    ectx.fill();
    ectx.strokeStyle='rgba(255,215,30,0.6)';
    ectx.lineWidth=1.5;
    ectx.stroke();

    // Pupil position — track cursor or idle drift
    var dx=cursorX-cx, dy=cursorY-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var px=Math.sin(t*0.8+i*1.5)*5;
    var py=Math.cos(t*0.6+i*2.0)*2.5;
    if(dist>1 && touching>0.3){
      var drift=Math.min(dist*0.04,10);
      px=dx/dist*drift;
      py=dy/dist*drift;
    }

    // Pupil glow
    var g2=ectx.createRadialGradient(cx+px,cy+py,0,cx+px,cy+py,14);
    g2.addColorStop(0,'rgba(255,220,50,0.8)');
    g2.addColorStop(0.3,'rgba(255,200,30,0.25)');
    g2.addColorStop(1,'rgba(255,200,30,0)');
    ectx.fillStyle=g2;
    ectx.beginPath();
    ectx.arc(cx+px,cy+py,14,0,Math.PI*2);
    ectx.fill();

    // Pupil core
    ectx.beginPath();
    ectx.arc(cx+px,cy+py,4.5,0,Math.PI*2);
    ectx.fillStyle='rgba(255,230,80,0.95)';
    ectx.fill();

    // Center dot
    ectx.beginPath();
    ectx.arc(cx+px,cy+py,1.5,0,Math.PI*2);
    ectx.fillStyle='rgba(255,255,220,1)';
    ectx.fill();
  }
}

function frame(ts){
  touching+=(targetTouch-touching)*0.05;
  try{
    gl.uniform1f(uT,ts/1000);gl.uniform2f(uR,bgCanvas.width,bgCanvas.height);
    gl.uniform2f(uM,mx,my);gl.uniform1f(uTouch,touching);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }catch(e){}
  drawEyes(ts);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
