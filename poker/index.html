<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 28px; color: #00d4aa; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #6b6b8a; font-size: 13px; margin-bottom: 24px; }

    /* ── Login screen ── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 80vh; flex-direction: column;
    }
    .login-box {
      background: #161b22; border: 1px solid #30363d; border-radius: 16px;
      padding: 40px 36px; text-align: center; max-width: 360px; width: 100%;
    }
    .login-box h1 { margin-bottom: 8px; }
    .login-box .subtitle { margin-bottom: 20px; }
    .login-input {
      width: 100%; padding: 12px 16px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 8px; color: #e0e0e0; font-size: 14px; text-align: center;
      letter-spacing: 2px;
    }
    .login-input:focus { outline: none; border-color: #00d4aa; }
    .login-input.error { border-color: #ff4444; animation: shake 0.3s; }
    @keyframes shake { 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .login-btn {
      margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer; background: #00d4aa; color: #0d1117;
    }
    .login-btn:hover { background: #00b894; }

    /* ── Dashboard ── */
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 20px; margin-bottom: 20px;
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: #00d4aa;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
    }
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .stat-box {
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      padding: 16px 12px; text-align: center;
    }
    .stat-val { font-size: 24px; font-weight: 800; }
    .stat-val.pos { color: #00d4aa; }
    .stat-val.neg { color: #ff4444; }
    .stat-val.neutral { color: #e0e0e0; }
    .stat-label { font-size: 10px; color: #6b6b8a; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    canvas { width: 100%; height: 300px; border-radius: 8px; background: #0d1117; }
    table.sessions { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.sessions th {
      background: #0d1117; color: #00d4aa; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 8px 6px; text-align: center; border-bottom: 2px solid #30363d;
    }
    table.sessions th:first-child { text-align: left; }
    table.sessions td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #21262d; }
    table.sessions td:first-child { text-align: left; }
    table.sessions tr:hover td { background: rgba(0,212,170,0.03); }
    .pos { color: #00d4aa; font-weight: 600; }
    .neg { color: #ff4444; font-weight: 600; }
    .hidden { display: none; }
    .btn {
      padding: 10px 24px; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 700; cursor: pointer; margin-top: 10px;
    }
    .btn-primary { background: #00d4aa; color: #0d1117; }
    .btn-primary:hover { background: #00b894; }
    .btn-outline { background: transparent; border: 1px solid #30363d; color: #e0e0e0; }
    .btn-outline:hover { border-color: #00d4aa; color: #00d4aa; }
    .btn-danger { background: transparent; border: 1px solid #ff4444; color: #ff4444; }
    .btn-danger:hover { background: #ff4444; color: #fff; }
    .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
    .loading { text-align: center; color: #6b6b8a; padding: 40px; font-size: 14px; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #00d4aa; color: #0d1117; padding: 10px 24px; border-radius: 8px;
      font-weight: 700; font-size: 13px; display: none; z-index: 999;
    }
    .del-btn {
      background: none; border: none; color: #ff4444; cursor: pointer; font-size: 14px;
      opacity: 0.5; padding: 2px 6px;
    }
    .del-btn:hover { opacity: 1; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header-bar .user-info { font-size: 11px; color: #6b6b8a; }
    .header-bar .logout-btn {
      background: none; border: 1px solid #30363d; color: #6b6b8a; padding: 4px 12px;
      border-radius: 6px; font-size: 11px; cursor: pointer;
    }
    .header-bar .logout-btn:hover { border-color: #ff4444; color: #ff4444; }
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      canvas { height: 200px; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="login-wrap">
    <div class="login-box">
      <h1>♠ Poker</h1>
      <div class="subtitle">Enter passphrase to view dashboard</div>
      <input type="password" id="pwInput" class="login-input" placeholder="passphrase" autofocus />
      <button class="login-btn" id="loginBtn">Unlock</button>
    </div>
  </div>

  <!-- Dashboard (hidden until auth) -->
  <div id="app" class="container hidden">
    <div class="header-bar">
      <div><h1 style="text-align:left;font-size:22px">♠ Poker Dashboard</h1></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="logout-btn" id="refreshBtn">↻ Refresh</button>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div id="loadingMsg" class="loading">Loading sessions...</div>

    <div id="dashboard" class="hidden">
      <div class="stats-row" id="summaryStats"></div>

      <div class="card">
        <div class="card-title">Cumulative Profit</div>
        <canvas id="profitChart"></canvas>
      </div>

      <div class="card">
        <div class="card-title">Session History</div>
        <div id="sessionTable"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-outline" id="exportBtn">Download JSON</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ══════════════════════════════════════
    //  SUPABASE CONFIG (same project as efuu site)
    // ══════════════════════════════════════
    const SUPABASE_URL = 'https://llcpgdapzcumrqujzznr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsY3BnZGFwemN1bXJxdWp6em5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDg1MzUsImV4cCI6MjA4OTc4NDUzNX0.vnjR_ELd1zdXHRCL80M5a47AlSS32dEaOD4T1_4Xus4';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let sessions = [];

    // ── Auth ──
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function checkPassword(pw) {
      const hash = await sha256(pw);
      const { data } = await db.from('site_settings').select('value').eq('key', 'poker_pw_hash').single();
      return data && data.value === hash;
    }

    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    document.getElementById('pwInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

    async function tryLogin() {
      const pw = document.getElementById('pwInput').value;
      if (!pw) return;
      const ok = await checkPassword(pw);
      if (ok) {
        sessionStorage.setItem('poker_auth', '1');
        showApp();
      } else {
        document.getElementById('pwInput').classList.add('error');
        setTimeout(() => document.getElementById('pwInput').classList.remove('error'), 400);
      }
    }

    // Auto-login if already authed this session
    if (sessionStorage.getItem('poker_auth')) {
      showApp();
    }

    function showApp() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadSessions();
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('poker_auth');
      location.reload();
    });

    // ── Load from Supabase ──
    async function loadSessions() {
      document.getElementById('loadingMsg').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
      try {
        const { data, error } = await db
          .from('poker_sessions')
          .select('*')
          .order('start_time', { ascending: true });

        if (error) throw error;

        sessions = (data || []).map(r => ({
          id: r.id,
          gameName: r.game_name,
          startTime: new Date(r.start_time).getTime(),
          endTime: r.end_time ? new Date(r.end_time).getTime() : null,
          duration: r.duration_ms,
          buyin: parseFloat(r.buyin),
          cashout: parseFloat(r.cashout),
          profit: parseFloat(r.profit),
          addons: r.addons || [],
          notes: r.notes || '',
        }));

        document.getElementById('loadingMsg').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        renderDashboard();
      } catch (e) {
        document.getElementById('loadingMsg').textContent = 'Error loading: ' + e.message;
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadSessions);

    // ── Delete session ──
    async function deleteSession(id) {
      if (!confirm('Delete this session?')) return;
      const { error } = await db.from('poker_sessions').delete().eq('id', id);
      if (error) { showToast('Delete failed: ' + error.message); return; }
      showToast('Session deleted');
      loadSessions();
    }

    // ── Render ──
    function renderDashboard() {
      renderSummary();
      renderChart();
      renderTable();
    }

    function renderSummary() {
      const c = document.getElementById('summaryStats');
      const n = sessions.length;
      if (n === 0) { c.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#6b6b8a;padding:20px">No sessions yet. Buy in from the extension to start tracking!</div>'; return; }
      const totalProfit = sessions.reduce((s, x) => s + x.profit, 0);
      const totalBuyin = sessions.reduce((s, x) => s + x.buyin, 0);
      const totalHours = sessions.reduce((s, x) => s + (x.duration || 0), 0) / 3600000;
      const hourly = totalHours > 0 ? totalProfit / totalHours : 0;
      const wins = sessions.filter(x => x.profit > 0).length;
      const winRate = (wins / n * 100);
      const roi = totalBuyin > 0 ? (totalProfit / totalBuyin * 100) : 0;
      const best = Math.max(...sessions.map(x => x.profit));
      const worst = Math.min(...sessions.map(x => x.profit));

      c.innerHTML = `
        <div class="stat-box"><div class="stat-val neutral">${n}</div><div class="stat-label">Sessions</div></div>
        <div class="stat-box"><div class="stat-val ${totalProfit>=0?'pos':'neg'}">${totalProfit>=0?'+':''}$${totalProfit.toFixed(2)}</div><div class="stat-label">Net Profit</div></div>
        <div class="stat-box"><div class="stat-val ${hourly>=0?'pos':'neg'}">${hourly>=0?'+':''}$${hourly.toFixed(2)}</div><div class="stat-label">$/Hour</div></div>
        <div class="stat-box"><div class="stat-val ${winRate>=50?'pos':'neg'}">${winRate.toFixed(0)}%</div><div class="stat-label">Win Rate</div></div>
        <div class="stat-box"><div class="stat-val ${roi>=0?'pos':'neg'}">${roi>=0?'+':''}${roi.toFixed(1)}%</div><div class="stat-label">ROI</div></div>
        <div class="stat-box"><div class="stat-val pos">+$${best.toFixed(2)}</div><div class="stat-label">Best Session</div></div>
        <div class="stat-box"><div class="stat-val neg">${worst>=0?'+':''}$${worst.toFixed(2)}</div><div class="stat-label">Worst Session</div></div>
        <div class="stat-box"><div class="stat-val neutral">${totalHours.toFixed(1)}h</div><div class="stat-label">Total Hours</div></div>
      `;
    }

    function renderChart() {
      const canvas = document.getElementById('profitChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const W = rect.width, H = rect.height;

      let cum = [0];
      let labels = ['Start'];
      sessions.forEach(s => {
        cum.push(cum[cum.length-1] + s.profit);
        const d = new Date(s.startTime);
        labels.push(`${d.getMonth()+1}/${d.getDate()}`);
      });

      const maxV = Math.max(...cum, 1), minV = Math.min(...cum, -1);
      const range = maxV - minV || 1;
      const pad = {top:30, right:20, bottom:40, left:60};
      const cW = W-pad.left-pad.right, cH = H-pad.top-pad.bottom;

      ctx.fillStyle = '#0d1117'; ctx.fillRect(0,0,W,H);

      // Grid
      ctx.strokeStyle='#21262d'; ctx.lineWidth=1;
      ctx.fillStyle='#6b6b8a'; ctx.font='10px -apple-system,sans-serif'; ctx.textAlign='right';
      for(let i=0;i<=5;i++){
        const y=pad.top+(cH*i/5), val=maxV-(range*i/5);
        ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
        ctx.fillText('$'+val.toFixed(0), pad.left-8, y+4);
      }

      // Zero line
      const zY = pad.top+(maxV/range)*cH;
      ctx.strokeStyle='#30363d'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(pad.left,zY); ctx.lineTo(W-pad.right,zY); ctx.stroke();
      ctx.setLineDash([]);

      if(cum.length>1){
        ctx.beginPath();
        for(let i=0;i<cum.length;i++){
          const x=pad.left+(i/(cum.length-1))*cW;
          const y=pad.top+((maxV-cum[i])/range)*cH;
          i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.strokeStyle='#00d4aa'; ctx.lineWidth=2.5; ctx.stroke();

        // Fill
        ctx.lineTo(pad.left+cW, zY); ctx.lineTo(pad.left, zY); ctx.closePath();
        const grad=ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);
        grad.addColorStop(0,'rgba(0,212,170,0.15)'); grad.addColorStop(1,'rgba(0,212,170,0)');
        ctx.fillStyle=grad; ctx.fill();

        // Dots
        for(let i=0;i<cum.length;i++){
          const x=pad.left+(i/(cum.length-1))*cW;
          const y=pad.top+((maxV-cum[i])/range)*cH;
          ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2);
          ctx.fillStyle=cum[i]>=0?'#00d4aa':'#ff4444'; ctx.fill();
          ctx.strokeStyle='#0d1117'; ctx.lineWidth=1.5; ctx.stroke();
        }

        // X labels
        ctx.fillStyle='#6b6b8a'; ctx.font='9px -apple-system,sans-serif'; ctx.textAlign='center';
        const step=Math.max(1,Math.floor(labels.length/10));
        for(let i=0;i<labels.length;i+=step){
          ctx.fillText(labels[i], pad.left+(i/(cum.length-1))*cW, H-pad.bottom+16);
        }
      }
    }

    function renderTable() {
      const c = document.getElementById('sessionTable');
      if(sessions.length===0){ c.innerHTML='<div style="text-align:center;color:#6b6b8a;padding:20px">No sessions yet</div>'; return; }
      const rev = [...sessions].reverse();
      let html = `<table class="sessions"><thead><tr>
        <th>Date</th><th>Game</th><th>Buy-in</th><th>Cash-out</th><th>P/L</th><th>Duration</th><th></th>
      </tr></thead><tbody>`;
      for(const s of rev){
        const d=new Date(s.startTime);
        const date=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        const dur=s.duration?formatTime(s.duration):'—';
        const cls=s.profit>=0?'pos':'neg';
        const sign=s.profit>=0?'+':'';
        html+=`<tr>
          <td>${date}</td><td>${s.gameName||'—'}</td>
          <td>$${s.buyin.toFixed(2)}</td><td>$${s.cashout.toFixed(2)}</td>
          <td class="${cls}">${sign}$${s.profit.toFixed(2)}</td><td>${dur}</td>
          <td><button class="del-btn" onclick="deleteSession('${s.id}')" title="Delete">✕</button></td>
        </tr>`;
      }
      html+='</tbody></table>';
      c.innerHTML=html;
    }

    function formatTime(ms){
      const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
      return h>0?`${h}h ${m}m`:`${m}m`;
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob=new Blob([JSON.stringify(sessions,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download='poker_sessions.json'; a.click(); URL.revokeObjectURL(url);
    });

    function showToast(msg){
      const t=document.getElementById('toast');
      t.textContent=msg; t.style.display='block';
      setTimeout(()=>t.style.display='none',2000);
    }

    window.addEventListener('resize', () => { if(sessions.length>0) renderChart(); });
  </script>
</body>
</html>
